name: Apply Aleya Supabase migrations

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require Supabase access token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not set; aborting." >&2
            exit 1
          fi
          echo "SUPABASE_ACCESS_TOKEN is present (value not logged)."
      - name: Apply migrations to jtktojbvbmiewpntpvhe only
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: jtktojbvbmiewpntpvhe
          SUPABASE_EXPECTED_ORG: tasqkbrzxjralyelioyv
        run: bash scripts/apply-aleya-migrations.sh
      - name: PostgREST smoke verify
        env:
          VITE_SUPABASE_URL: https://jtktojbvbmiewpntpvhe.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: bash scripts/verify-aleya-cloud.sh
